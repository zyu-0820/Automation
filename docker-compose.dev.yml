services:
  app:
    build: .
    container_name: java-service-manager-dev
    ports:
      - "8031:8000"
    volumes:
      - ./data:/app/data
      - ./backend/app:/app/app
    environment:
      - TZ=Asia/Shanghai
      - SECRET_KEY=change-me-in-production
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
